    <!-- PWA Install Banner styles -->
    <style>
      #pwa-install-banner {
        display: none;
        position: fixed;
        bottom: 80px;
        left: 12px;
        right: 12px;
        z-index: 9999;
        background: linear-gradient(135deg, #111814 0%, #0D1410 100%);
        border: 1px solid #C5A059;
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(197,160,89,0.1);
        font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
        direction: rtl;
        animation: slideUp 0.4s ease;
      }
      @keyframes slideUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      #pwa-install-banner.show { display: block; }
      .pwa-banner-top {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }
      .pwa-icon {
        width: 52px;
        height: 52px;
        border-radius: 12px;
        background: #0A0D0B;
        border: 1px solid rgba(197,160,89,0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 26px;
      }
      .pwa-info { flex: 1; }
      .pwa-title {
        color: #C5A059;
        font-size: 14px;
        font-weight: 700;
        margin: 0 0 2px 0;
      }
      .pwa-desc {
        color: rgba(224,216,208,0.7);
        font-size: 11px;
        margin: 0;
        line-height: 1.4;
      }
      .pwa-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .pwa-btn-install {
        flex: 1;
        background: #C5A059;
        color: #0A0D0B;
        border: none;
        border-radius: 10px;
        padding: 10px 16px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-width: 140px;
      }
      .pwa-btn-install:active { opacity: 0.85; }
      .pwa-btn-dismiss {
        background: transparent;
        color: rgba(224,216,208,0.5);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 12px;
        cursor: pointer;
      }
      /* iOS manual guide */
      #ios-guide {
        display: none;
        margin-top: 12px;
        padding: 10px 12px;
        background: rgba(197,160,89,0.08);
        border: 1px solid rgba(197,160,89,0.2);
        border-radius: 10px;
        color: rgba(224,216,208,0.85);
        font-size: 11px;
        line-height: 1.7;
      }
      #ios-guide.show { display: block; }
      #ios-guide strong { color: #C5A059; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- ===== BANNIÈRE D'INSTALLATION PWA ===== -->
    <div id="pwa-install-banner">
      <div class="pwa-banner-top">
        <div class="pwa-icon">🕌</div>
        <div class="pwa-info">
          <p class="pwa-title">ثبِّت تطبيق إسلام AI 📲</p>
          <p class="pwa-desc">أضفه لشاشتك الرئيسية واستخدمه بدون إنترنت مثل أي تطبيق عادي — مجاني تماماً</p>
        </div>
      </div>
      <div class="pwa-actions">
        <button class="pwa-btn-install" id="btn-pwa-install">
          ⬇️ تثبيت التطبيق مجاناً
        </button>
        <button class="pwa-btn-dismiss" id="btn-pwa-dismiss">لاحقاً</button>
      </div>
      <!-- Guide iOS -->
      <div id="ios-guide">
        <strong>📱 iPhone / iPad:</strong><br/>
        ١ — اضغط على زر <strong>المشاركة</strong> ⬆️ في أسفل Safari<br/>
        ٢ — اختر <strong>"إضافة إلى الشاشة الرئيسية"</strong> 🏠<br/>
        ٣ — اضغط <strong>إضافة</strong> — التطبيق سيظهر على شاشتك فوراً ✅
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- ===== Service Worker + PWA Install Logic ===== -->
    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }

      // Detect iOS
      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
      const isInStandaloneMode = window.matchMedia('(display-mode: standalone)').matches
        || window.navigator.standalone;

      // Show banner logic
      let deferredPrompt = null;
      const banner = document.getElementById('pwa-install-banner');
      const btnInstall = document.getElementById('btn-pwa-install');
      const btnDismiss = document.getElementById('btn-pwa-dismiss');
      const iosGuide = document.getElementById('ios-guide');

      // Don't show if already installed
      if (!isInStandaloneMode && !localStorage.getItem('pwa-dismissed')) {

        if (isIOS) {
          // Show after 3 seconds on iOS with manual guide
          setTimeout(() => {
            banner.classList.add('show');
            iosGuide.classList.add('show');
            btnInstall.textContent = '📱 كيفية التثبيت على iPhone';
            btnInstall.onclick = () => {
              iosGuide.classList.toggle('show');
            };
          }, 3000);
        } else {
          // Android/Desktop — wait for beforeinstallprompt
          window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            setTimeout(() => banner.classList.add('show'), 2000);
          });
        }
      }

      // Install button click
      if (btnInstall) {
        btnInstall.addEventListener('click', async () => {
          if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            banner.classList.remove('show');
            if (outcome === 'accepted') {
              localStorage.setItem('pwa-dismissed', '1');
            }
          }
        });
      }

      // Dismiss button
      if (btnDismiss) {
        btnDismiss.addEventListener('click', () => {
          banner.classList.remove('show');
          localStorage.setItem('pwa-dismissed', '1');
        });
      }

      // Hide banner if installed
      window.addEventListener('appinstalled', () => {
        banner.classList.remove('show');
        localStorage.setItem('pwa-dismissed', '1');
      });
    </script>
  </body>
</html>
